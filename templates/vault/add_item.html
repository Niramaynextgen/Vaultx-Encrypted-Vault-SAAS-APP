{% extends "base.html" %}

{% block content %}
<div class="form-page-wrapper">
    <div class="form-card">

        <div class="form-card-header">
            <div class="form-card-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <div>
                <h2 class="form-card-title">Add Credential</h2>
                <p class="form-card-subtitle">Store a new login securely in your vault</p>
            </div>
        </div>

        <!-- FIX 1: enctype added for file uploads -->
        <form method="post" enctype="multipart/form-data" class="vault-form">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="website">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="2" y1="12" x2="22" y2="12"/>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                        Website / Service
                    </label>
                    <input type="text" name="title" id="website"
                           placeholder="e.g. GitHub, Gmail, Netflix" required class="form-input">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="vault_username">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                        </svg>
                        Username / Email
                    </label>
                    <input type="text" name="username" id="vault_username"
                           placeholder="Your username or email" class="form-input">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="vault_password">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        Password
                    </label>
                    <div class="input-password-wrapper">
                        <input type="password" name="password" id="vault_password"
                               placeholder="Enter password" class="form-input" required>
                        <button type="button" class="toggle-password"
                                onclick="togglePassword('vault_password', this)" tabindex="-1">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-track">
                            <div class="strength-fill" id="strength-fill"></div>
                        </div>
                        <span class="strength-label" id="strength-label">Enter a password</span>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="vault_notes">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                        Notes <span class="optional-badge">Optional</span>
                    </label>
                    <textarea name="content" id="vault_notes" rows="3"
                              placeholder="Any additional notes..." class="form-input form-textarea"></textarea>
                </div>
            </div>

            <!-- FIX 2: File attachments field added -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="attachments">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                        </svg>
                        Attachments <span class="optional-badge">Optional — multiple allowed</span>
                    </label>
                    <input type="file" name="attachments" id="attachments"
                           multiple
                           accept=".pdf,.doc,.docx,.xlsx,.jpg,.jpeg,.png,.mp4"
                           class="form-input file-input">
                    <span class="field-hint">Supported: PDF, DOC, XLSX, JPG, PNG, MP4</span>
                </div>
            </div>

            <div class="form-actions">
                <a href="{% url 'dashboard' %}" class="btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Cancel
                </a>
                <button type="submit" class="btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Save Credential
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    if (!field) return;
    field.type = field.type === 'password' ? 'text' : 'password';
    btn.classList.toggle('active');
}

document.getElementById('vault_password')?.addEventListener('input', function() {
    const val = this.value;
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    if (!fill || !label) return;

    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = ['', 'Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
    const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#10b981'];
    const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];

    fill.style.width  = widths[score] || '0%';
    fill.style.background = colors[score] || 'transparent';
    label.textContent = val ? (levels[score] || 'Enter a password') : 'Enter a password';
    label.style.color = colors[score] || '#9ca3af';
});
</script>
{% endblock %}
